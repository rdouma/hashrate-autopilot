# Umbrel app manifest. Loaded when this repo is added as a Community
# App Store. Umbrel community-store convention: the directory name
# (and the `id:` field below) must be prefixed with the store's id
# from `umbrel-app-store.yml` - here that's `rdouma-`.

manifestVersion: 1
id: rdouma-hashrate-autopilot
category: bitcoin
name: Hashrate Autopilot
version: "1.7.7"
tagline: Autopilot for renting hashrate to mine on Ocean Mining
icon: https://raw.githubusercontent.com/rdouma/hashrate-autopilot/main/assets/icon-512.png
# Umbrel renders description literally - no YAML folding of soft
# line breaks. Each paragraph MUST be one physical line; a single
# blank line separates paragraphs. Do NOT introduce soft wraps at
# ~80 chars, your editor's pretty-printing will render as awkward
# mid-sentence breaks on the app card.
description: |
  Rent hashrate on the Braiins Hashpower marketplace and route it to your own Ocean non-custodial mining pool, automatically. Each tick the autopilot finds the cheapest available price for your target hashrate, adds a small operator-chosen cushion, and bids exactly that price. You set a maximum you are willing to pay, and the controller never goes above it.

  Why this matters: Ocean is a non-custodial pool. Each Ocean block's coinbase pays out to every miner whose accumulated earnings have crossed the on-chain payout threshold (1,048,576 sat) - the coinbase IS the payout, in a single transaction the chain itself executes when the block confirms. Most pools (FPPS, PPS+, PPLNS) instead pay their own wallet first and then send miners a second transaction on the pool's settlement cadence; that intermediate pool wallet is bitcoin the pool custodies on your behalf, and it's what gets lost when a pool goes dark. With Ocean your maximum exposure to pool failure is your current unpaid balance (bounded by the threshold), and every past payout is publicly verifiable on-chain forever. Ocean's Datum templates also filter non-financial spam transactions. Renting hashrate to that kind of pool is a small contribution to keeping Bitcoin mining decentralized.

  Solo mining via Ocean's solo template should also work, though so far the autopilot has only been tested against the regular Ocean+Datum pool setup.

  Setup is a three-step web wizard accessible at port 3010. After setup you get a dashboard with live decisions, charts, the DRY-RUN / LIVE / PAUSED switch, and a P&L panel that reads spend from Braiins and earnings from your on-chain wallet.

  This app declares Datum Gateway as a dependency, so Umbrel will prompt you to install it during setup. Once both apps run on the same Umbrel, the autopilot's dashboard auto-discovers the local Datum HTTP API across Umbrel's shared Docker network - zero copy/paste, the worker-count and hashrate panels populate on first boot. (Pointing at a Datum gateway running off-Umbrel is also supported - just override the URL in Config after setup.)

  For the P&L panel's earnings figure, a Bitcoin Knots / Bitcoin Core RPC endpoint is helpful but not required - the autopilot does not need Bitcoin RPC to bid. Bitcoin is intentionally not declared as a dependency so this app stays lightweight; you can point it at any reachable Bitcoin RPC after setup.

