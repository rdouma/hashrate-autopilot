releaseNotes: |
  v1.6.0 - alerts pipeline maturity pass.

  NEW
  - In-dashboard toast notifications: when a new alert lands, a small toast slides in at the bottom-right with severity-coloured border, severity pill, title, and body preview. Click navigates to /alerts; auto-dismiss timing depends on severity (5 s for INFO and recoveries, 15 s for IMPORTANT / WARNING).
  - Braiins deposit lifecycle restored: two Telegram messages per deposit - "Detected" when Braiins first observes the on-chain transaction (mempool / first-confirmation), then "Available" 6-12 min later once compliance has cleared and the funds are spendable on the marketplace. A third "Returned" IMPORTANT message fires on the rare case compliance bounces the deposit back.
  - Alerts page redesign: flat row list replaced with collapsible event cards grouped into OPEN / ACKNOWLEDGED / RESOLVED buckets. Open cards expand by default; the others collapse to a header. Free-text search box filters across titles + bodies with hit-highlighting. Severity badges restored on every row.
  - Multilingual Telegram messages: alert copy follows the operator's chosen Telegram language (English / Dutch / Spanish), independent of the dashboard's display language.
  - Notifications config rebuild: every event-class tile carries a severity pill (IMPORTANT red, WARNING amber, INFO slate) matching the chat conventions. Timer-driven events have inline minute thresholds; Datum-unreachable and sustained-paused now have independent config fields (previously both fell out of pool_outage_blip_tolerance_seconds × 5).
  - Cheap mode now lives in its own section on Config → Strategy with an explicit Enable checkbox - no more "set threshold to 0 to disable" guessing.
  - Pool-luck step markers on the Hashrate chart: line steps up at every pool-block credit, decays continuously between blocks.

  FIXES
  - Severity rename ERROR → IMPORTANT; new INFO tier explicitly for opt-in good news (pool block credited, deposit lifecycle).
  - Recovery alert titles read positive ("Bid active again", not "✓ Bid sustained-paused").
  - Sustained-paused detector reads the live status, not the lingering last_pause_reason that would keep it firing after recovery.
  - Wallet-runway threshold accepts fractional days (0.5, 1.5, ...).
  - Snooze removed entirely; replaced by the simpler ack-only model that survives all flows (dashboard, Telegram button, restart).
  - Unicode arrows (→) in Telegram messages instead of ASCII (->); matches the rest of the rich-Unicode formatting.
  - Deposit-detected message reframes compliance screening as the rare case (it's the 3-confirmation typical path, not the 48-hour edge case).
  - Sticky upgrade banner: the "new version available" prompt now stays pinned at the top of the viewport on scroll.
  - Chart markers: cap on max bid-event markers rendered; over the cap, EDIT_PRICE markers drop out first.

  First watcher poll silently absorbs already-credited historical deposits, so no Telegram flood - only future deposits produce events.

  v1.5.4 - the actual electrs-only fix.

  FIX
  - On-chain payouts populate the chart on Umbrel installs (and any other electrs-only setup without Bitcoin Core RPC). Previous fixes (v1.5.1 / v1.5.2) added the right code inside PayoutObserver, but main.ts's construction guard required bitcoindClient and so the observer was never instantiated when bitcoind RPC creds were absent. Relaxed the guard to allow electrs-only construction. Daemon log now explicitly reports whether the observer is ENABLED or DISABLED on startup (with the exact reason if disabled), so the next regression of this shape is grep-able from the log instead of presenting as a silent flat-zero chart.

  Restart Umbrel app or scripts/deploy.sh after upgrade. Within ~60s the balance panel should populate; the chart's lifetime-earnings line backfills retroactively shortly after.

  v1.5.3 - "new version available" banner fix.

  FIX
  - Dashboard's "new version available, click to refresh" banner now actually fires on Docker / Umbrel installs. The /api/build endpoint reads BUILD_NUMBER off disk to report the running build, but the runtime image stage wasn't copying that file out of the builder - so /api/build returned `build: 0` inside the container, the banner's `daemon > dashboard` check could never be true, and the prompt never appeared. Pre-existing bug since #103; surfaced now because the v1.5.1 -> v1.5.2 update silently failed to nudge anyone on Umbrel. After this update lands, future releases will surface a banner the moment the daemon comes back up at the new version.

  Restart Umbrel app or scripts/deploy.sh after upgrade.

  v1.5.2 - hot-fix on top of v1.5.1.

  FIX
  - On-chain payouts populate the chart on Umbrel installs (and any other electrs-only setup without Bitcoin Core RPC). v1.5.1's "Electrs payout-observer now writes reward_events" fix only worked when bitcoind RPC was ALSO configured - the side-scan it added required a bitcoind client. Replaced with an electrs-native path: blockchain.scripthash.listunspent for the per-UTXO list, blockchain.block.header parsed for the actual on-chain timestamp. Backfills retroactively within ~60s of restart - your historical payouts now appear at their real block dates on the price chart's "paid earnings (lifetime)" line.
  - Two example placeholders in the Config UI no longer leak personal hostnames (the dev box's name was bleeding into operator-facing text).

  Restart Umbrel app or scripts/deploy.sh after upgrade.

  v1.5.1 - polish + bug-fix release.

  NEW
  - Telegram instance-label prefix: run multiple daemons against the same bot/chat and tell them apart at a glance.
  - Inline Mark-as-seen / Snooze 2h buttons in Telegram messages now actually render (regression from 1.5.0). Tap on your phone, the row updates server-side via the bot's getUpdates long-poll.
  - Stale-URL banner on Status and Config: warn when an active bid is bound to a now-stale destination URL after a Pool URL change, with a confirm-then-cancel flow that triggers a fresh bid on the next decision tick.
  - DDNS now supports DuckDNS and generic dyndns2 alongside No-IP. Ticks immediately on any DDNS-relevant config save (was up to 5-min lag) and on any detected ISP IP rotation.
  - Price chart: clickable event dots with rich tooltips on paid earnings (per on-chain payout), unpaid earnings (per Ocean pool block), and pool blocks. All deep-link to your configured block explorer.
  - Hashrate chart: difficulty retarget markers when right-axis = network difficulty.
  - Alerts page: "mark all as seen (N)" bulk button + sticky "unacknowledged only" filter.
  - Block explorer: separate transaction URL template auto-derived from your existing block template (mempool/blockstream/blockchair/btcscan/btc.com presets). Self-hosted explorers can override either independently.
  - Bundled "Ocean mining found a block" voice clip alongside the existing block-found cues.

  FIXES
  - Lifetime-earnings phantom upward spike at payout-transition buckets: chart now uses end-of-bucket semantics for both paid and unpaid totals, so the sum is stable across the moment the payout lands.
  - Electrs payout-observer now writes the reward_events ledger: paid-earnings line on the chart was flat-zero on electrs setups. Backfills retroactively on first run after upgrade.
  - On-chain payout dot now deep-links to the transaction (was rendering the {hash} placeholder literally).
  - Network difficulty removed from the Price chart's right-axis dropdown (was duplicated on both charts).
  - Various i18n + UI polish: locale leak on dates, DDNS "20582d ago" age bug, Config search width clipping tab labels.

  Restart Umbrel app or scripts/deploy.sh after upgrade.