# Umbrel app manifest. Loaded when this repo is added as a Community
# App Store. Umbrel community-store convention: the directory name
# (and the `id:` field below) must be prefixed with the store's id
# from `umbrel-app-store.yml` — here that's `rdouma-`.

manifestVersion: 1
id: rdouma-hashrate-autopilot
category: bitcoin
name: Hashrate Autopilot
version: "1.4.5"
tagline: Autopilot for renting hashrate to a non-custodial pool
icon: https://raw.githubusercontent.com/rdouma/hashrate-autopilot/main/assets/icon-512.png
description: >-
  Rent hashrate on the Braiins Hashpower marketplace and route it to
  your own Ocean non-custodial mining pool, automatically. Each tick
  the autopilot finds the cheapest available price for your target
  hashrate, adds a small operator-chosen cushion, and bids exactly
  that price. You set a maximum you are willing to pay, and the
  controller never goes above it.


  Why this matters: Ocean is a non-custodial pool, meaning rewards
  land directly in your own wallet (no custodian holding your bitcoin)
  and Ocean's Datum templates filter non-financial spam transactions.
  Renting hashrate to that kind of pool is a small contribution to
  keeping Bitcoin mining decentralized.


  Solo mining via Ocean's solo template should also work, though so
  far the autopilot has only been tested against the regular
  Ocean+Datum pool setup.


  Setup is a three-step web wizard accessible at port 3010. After
  setup you get a dashboard with live decisions, charts, the
  DRY-RUN / LIVE / PAUSED switch, and a P&L panel that reads spend
  from Braiins and earnings from your on-chain wallet.


  This app declares Datum Gateway as a dependency, so Umbrel will
  prompt you to install it during setup. Once both apps run on the
  same Umbrel, the autopilot's dashboard auto-discovers the local
  Datum HTTP API across Umbrel's shared Docker network - zero
  copy/paste, the worker-count and hashrate panels populate on
  first boot. (Pointing at a Datum gateway running off-Umbrel is
  also supported - just override the URL in Config after setup.)


  For the P&L panel's earnings figure, a Bitcoin Knots / Bitcoin
  Core RPC endpoint is helpful but not required - the autopilot
  does not need Bitcoin RPC to bid. Bitcoin is intentionally not
  declared as a dependency so this app stays lightweight; you can
  point it at any reachable Bitcoin RPC after setup.

developer: Remco Douma
website: https://github.com/rdouma/hashrate-autopilot
dependencies:
  - datum
repo: https://github.com/rdouma/hashrate-autopilot
support: https://github.com/rdouma/hashrate-autopilot/issues
port: 3010
# Gallery uses absolute GitHub-raw URLs (same pattern as the icon)
# because Umbrel resolves bare filenames against the store root,
# not the app subdir. Order is the operator-eye story arc:
# status-page-hero -> status-page-charts -> wizard-step-1
# -> wizard-step-2. First image is the card hero.
gallery:
  - https://raw.githubusercontent.com/rdouma/hashrate-autopilot/main/rdouma-hashrate-autopilot/1.jpg
  - https://raw.githubusercontent.com/rdouma/hashrate-autopilot/main/rdouma-hashrate-autopilot/2.jpg
  - https://raw.githubusercontent.com/rdouma/hashrate-autopilot/main/rdouma-hashrate-autopilot/3.jpg
  - https://raw.githubusercontent.com/rdouma/hashrate-autopilot/main/rdouma-hashrate-autopilot/4.jpg
path: ""
defaultUsername: ""
defaultPassword: ""
submitter: Remco Douma
submission: https://github.com/rdouma/hashrate-autopilot
releaseNotes: >-
  v1.4.5 - 1w Price chart fixes + Docker footer version.
  The 1w view of the Price chart was rendering as a forest of
  vertical sticks because the bucket size (5 min) packed 2,016
  points into ~784px of chart width. Bucket bumped to 30 min,
  and the per-line gap-bridge threshold is now adaptive, so the
  bid / fillable / hashprice / max-bid lines render continuously
  and real outages still show as visible breaks. Plus: dense
  EDIT_PRICE markers are now hidden at 1w and longer (the rare
  CREATE / EDIT_SPEED / CANCEL still show). Plus: fixes the
  `vunknown` footer label that v1.4.3 left on Docker and Umbrel
  installs - APP_VERSION is now threaded through as a Docker
  build-arg, so the in-image footer always matches the released
  manifest version. (Skipping v1.4.4 - that publish failed and
  was reverted.)
