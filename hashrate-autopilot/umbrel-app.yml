# Umbrel app manifest. Loaded by Umbrel when this repo is added as a
# Community App Store. The app's directory name (`hashrate-autopilot/`)
# is the canonical app id.

manifestVersion: 1
id: hashrate-autopilot
category: bitcoin
name: Hashrate Autopilot
version: "1.3.1"
tagline: Personal-scale autopilot for the Braiins Hashpower marketplace
description: >-
  Keeps a rented-hashrate bid continuously alive on the Braiins Hashpower
  marketplace at an operator-chosen price ceiling, so purchased hashrate
  keeps landing at your own Datum-connected pool without manual babysitting.

  Each tick the controller sets the bid to `min(fillable_ask + overpay,
  effective_cap)` — Braiins matches pay-your-bid, so the bid price *is*
  the price paid. A React dashboard binds to the LAN, shows live decisions
  and charts, and exposes operator overrides (DRY-RUN / LIVE / PAUSED).

  First-run onboarding is a three-step web wizard. Bitcoin Core RPC
  credentials auto-detect from this Umbrel's bitcoind dependency — no
  copy/paste needed.

developer: Remco Douma
website: https://github.com/rdouma/hashrate-autopilot
dependencies:
  - bitcoin
repo: https://github.com/rdouma/hashrate-autopilot
support: https://github.com/rdouma/hashrate-autopilot/issues
port: 3010
gallery:
  - 1.jpg
path: ""
defaultUsername: ""
defaultPassword: ""
submitter: Remco Douma
submission: https://github.com/rdouma/hashrate-autopilot
releaseNotes: >-
  Initial Community App Store release. The app's first-run wizard handles
  setup; Bitcoin Core RPC auto-detects from Umbrel's injected env vars.
