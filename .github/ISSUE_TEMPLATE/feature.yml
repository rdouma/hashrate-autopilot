name: Feature request
description: Suggest a new feature, an improvement, or a behaviour change
title: "[feature] "
labels: ["feature", "backlog"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! A few things worth knowing before
        you write:

        - This is a solo hobby project. I read every request, but I
          can't promise to ship them on any particular timeline -
          and I do say "out of scope" when something doesn't fit
          the project's direction. Don't take it personally.
        - For open-ended questions ("could it support X?", "would
          you ever want to do Y?"), [Discussions](https://github.com/rdouma/hashrate-autopilot/discussions)
          is usually a better fit than an issue. Issues are for
          concrete asks I can act on.
        - The autopilot is deliberately scoped to non-custodial
          mining via Datum-compatible pools, with Braiins as the
          first hashpower marketplace. Other markets / pools / use
          cases are not automatically out of scope, but they need
          a strong case.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve for you?
      description: |
        The thing you're trying to do today that this would make
        easier or possible. "I'd like X" is OK; "I'm trying to do Y
        and I keep running into Z" is much better.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behaviour
      description: |
        What would you like to see happen? UI sketches, sample log
        lines, mock CHANGELOG entries are all welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Other ways you could solve this (existing config knobs, a
        downstream script, a different tool). Helps me understand
        whether the right answer is "yes, build it" vs "here's a
        different way."

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: |
        Links to related issues, prior-art tools, screenshots, etc.
