# Docker image build + publish (#58).
#
# Runs in two modes:
#
# - **Verify** (push to main, pull request): builds the image for
#   `linux/amd64` only, *without* publishing. Catches Dockerfile
#   regressions before they reach a release tag.
# - **Publish** (`v*` tag, manual dispatch): builds for both
#   `linux/amd64` and `linux/arm64` and pushes to
#   `ghcr.io/<owner>/hashrate-autopilot` with every relevant tag
#   permutation (vX.Y.Z, vX.Y, vX, latest).
#
# ARM64 is mandatory for appliance deployments - Umbrel and Start9
# both run on Pi-class hardware. We only build it on the publish
# path because QEMU-emulated arm64 builds take ~5x longer than
# native amd64.

name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine mode
        id: mode
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        if: steps.mode.outputs.publish == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.mode.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read app version from umbrel-app.yml
        id: app_version
        run: |
          set -euo pipefail
          VER=$(grep -E '^version:' rdouma-hashrate-autopilot/umbrel-app.yml \
                | head -1 \
                | sed -E 's/^version:[[:space:]]*"?([^"[:space:]]+)"?.*/\1/')
          if [[ -z "$VER" ]]; then
            echo "::warning::could not parse version: from umbrel-app.yml; footer will read 'vunknown'"
            VER="unknown"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "App version: $VER"

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/hashrate-autopilot
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # v-prefixed mirrors. docker/metadata-action's default
            # semver patterns strip the `v` (so a `v1.4.1` git tag
            # becomes a `1.4.1` image tag). That is fine for GHCR's
            # native UI but breaks anyone who copies the git tag
            # verbatim into a docker pull. Publishing both forms
            # makes `:v1.4.1` and `:1.4.1` resolve to the same image,
            # so docker-compose pins of either shape just work.
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}

      - name: Build (and push on tags)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ steps.mode.outputs.platforms }}
          push: ${{ steps.mode.outputs.publish }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Bake the short git SHA + app version into the image so
          # the dashboard footer reads `vX.Y.Z - build N - <sha>`
          # instead of `vunknown - build N - dev`. `.dockerignore`
          # strips `.git/` AND the umbrel-app.yml manifest dir from
          # the build context, so without these build-args
          # vite.config.ts has no way to learn either value.
          # APP_VERSION is parsed from rdouma-hashrate-autopilot/
          # umbrel-app.yml at workflow time - same canonical source
          # the Umbrel community store reads, so the in-image footer
          # cannot drift from the published release.
          build-args: |
            GIT_SHA=${{ github.sha }}
            APP_VERSION=${{ steps.app_version.outputs.version }}
          # Cache layers in the GHA cache for faster subsequent
          # builds. Important for the ARM64 leg, which would
          # otherwise compile better-sqlite3 from source on every
          # run.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        if: always()
        run: |
          echo "## Docker build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Mode: \`${{ steps.mode.outputs.publish == 'true' && 'publish' || 'verify' }}\`  " >> "$GITHUB_STEP_SUMMARY"
          echo "Platforms: \`${{ steps.mode.outputs.platforms }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.mode.outputs.publish }}" == "true" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Published tags" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
