# Umbrel Community App Store manifest. Lives at the repo root because
# Umbrel's "Add App Store" flow expects this file there.
#
# Operators add this store to their Umbrel via:
#   Settings → App Stores → Add App Store
#   → https://github.com/rdouma/hashrate-autopilot
# Umbrel then walks each top-level directory of this repo looking for
# umbrel-app.yml manifests. Today there's exactly one: hashrate-autopilot/.
#
# When the official Umbrel store accepts a submission of the same
# manifest, this Community Store entry can be deprecated in favour
# of the official one.

id: rdouma
# Umbrel renders this as "<name> App Store" - so this becomes
# "Hashrate Autopilot App Store".
name: Hashrate Autopilot
tagline: Decentralizing Bitcoin mining, one pleb at a time
